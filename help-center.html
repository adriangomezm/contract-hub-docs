<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Hub Help Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Polymath Text';
  src: url('fonts/PolymathTextDemo-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'Polymath Text';
  src: url('fonts/PolymathTextDemo-Bold.otf') format('opentype');
  font-weight: 700;
  font-style: normal;
}

:root {
  --purple-deep: #230F59;
  --purple-mid: #3D1F8E;
  --purple-light: #6B4FCF;
  --purple-pale: #E8E0F5;
  --sage: #B8D4C8;
  --lavender: #C5CAE9;
  --pink: #F0B8D0;
  --amber: #F0A830;
  --cream: #FAF8F5;
  --white: #FFFFFF;
  --text-dark: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-light: #9B9B9B;
  --border: #E8E4DF;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-hover: 0 6px 20px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Polymath Text', 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text-dark);
  background: var(--cream);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple-mid) 50%, var(--purple-light) 100%);
  position: relative;
  overflow: hidden;
}

.header-decor {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.06;
}
.header-decor::before {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border: 2px solid #fff;
  border-radius: 50%;
  top: -180px; right: -80px;
}
.header-decor::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border: 2px solid #fff;
  border-radius: 50%;
  bottom: -120px; left: -60px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 40px;
  position: relative;
  z-index: 2;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: #fff;
}
.header-logo svg { height: 28px; width: auto; }
.header-logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.header-nav {
  display: flex;
  gap: 24px;
  align-items: center;
}
.header-nav a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}
.header-nav a:hover { color: #fff; }

.header-content {
  text-align: center;
  padding: 48px 40px 56px;
  position: relative;
  z-index: 2;
}
.header-content h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 24px;
  letter-spacing: -0.5px;
}

.search-box {
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-family: inherit;
  background: rgba(255,255,255,0.95);
  color: var(--text-dark);
  outline: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transition: box-shadow 0.2s;
}
.search-box input::placeholder { color: var(--text-light); }
.search-box input:focus { box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
.search-box .search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-light);
}

/* ─── HEADER COMPACT (Collection & Article pages) ─── */
.header.compact .header-content {
  padding: 24px 40px 32px;
}
.header.compact .header-content h1 { font-size: 26px; margin-bottom: 16px; }

/* ─── MAIN CONTENT ─── */
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ─── BREADCRUMBS ─── */
.breadcrumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 32px;
  font-size: 14px;
}
.breadcrumbs a {
  color: var(--purple-mid);
  text-decoration: none;
  font-weight: 500;
}
.breadcrumbs a:hover { text-decoration: underline; }
.breadcrumbs .sep { color: var(--text-light); }
.breadcrumbs .current { color: var(--text-secondary); }

/* ─── COLLECTION GRID (Homepage) ─── */
.collections-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.collection-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: box-shadow 0.25s, transform 0.25s;
}
.collection-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.collection-card-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  font-size: 24px;
}

.collection-card h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--purple-deep);
  margin-bottom: 8px;
}

.collection-card p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 16px;
}

.collection-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-light);
}
.collection-card-meta .avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--lavender);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--purple-deep);
}

/* ─── COLLECTION PAGE (Article List) ─── */
.collection-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 32px;
}
.collection-header-icon {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.collection-header-info h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 4px;
}
.collection-header-info .meta {
  font-size: 14px;
  color: var(--text-secondary);
}

.article-list { list-style: none; }
.article-list li {
  border-bottom: 1px solid var(--border);
}
.article-list li:first-child { border-top: 1px solid var(--border); }

.article-list a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 4px;
  text-decoration: none;
  color: var(--text-dark);
  transition: color 0.15s;
}
.article-list a:hover { color: var(--purple-mid); }

.article-list .article-title {
  font-size: 15px;
  font-weight: 500;
}
.article-list .chevron {
  color: var(--text-light);
  font-size: 18px;
  flex-shrink: 0;
  margin-left: 12px;
}

/* ─── ARTICLE PAGE ─── */
.article-header {
  margin-bottom: 36px;
}
.article-header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 8px;
  line-height: 1.3;
}
.article-header .subtitle {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  line-height: 1.5;
}
.article-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-light);
}
.article-meta .avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--sage);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--purple-deep);
}

.article-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text-dark);
}

.article-body h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 21px;
  font-weight: 700;
  margin: 36px 0 16px;
  color: var(--text-dark);
  padding-bottom: 8px;
  border-bottom: 2px solid var(--purple-pale);
}

.article-body h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 600;
  margin: 28px 0 12px;
  color: var(--text-dark);
}

.article-body p { margin-bottom: 16px; }

.article-body ul, .article-body ol {
  margin: 12px 0 16px 24px;
}
.article-body li { margin-bottom: 8px; }

.article-body img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin: 20px 0;
  box-shadow: var(--shadow-sm);
}

.article-body strong { font-weight: 700; }

.article-body code {
  background: var(--purple-pale);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--purple-deep);
}

.info-box {
  background: #EDE7F6;
  border-left: 4px solid var(--purple-mid);
  padding: 16px 20px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 20px 0;
  font-size: 14px;
}
.info-box.tip { background: #E8F5E9; border-left-color: var(--sage); }
.info-box.warning { background: #FFF8E1; border-left-color: var(--amber); }
.info-box.important { background: #FCE4EC; border-left-color: var(--pink); }

.info-box strong {
  display: block;
  margin-bottom: 4px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ref-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0 24px;
  font-size: 14px;
}
.ref-table th {
  background: #F5F2ED;
  text-align: left;
  padding: 10px 14px;
  font-weight: 600;
  font-size: 13px;
  border-bottom: 2px solid var(--border);
}
.ref-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.ref-table tr:hover td { background: var(--cream); }

.status-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.status-badge.green { background: #E8F5E9; color: #2E7D32; }
.status-badge.amber { background: #FFF8E1; color: #F57F17; }
.status-badge.blue { background: #E3F2FD; color: #1565C0; }
.status-badge.red { background: #FCE4EC; color: #C62828; }
.status-badge.gray { background: #F5F5F5; color: #616161; }
.status-badge.purple { background: #EDE7F6; color: #4527A0; }

/* ─── SEARCH RESULTS ─── */
.search-results {
  margin-top: 8px;
}
.search-results h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--text-dark);
}
.search-result-item {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.search-result-item:hover { box-shadow: var(--shadow-md); }
.search-result-item h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--purple-deep);
  margin-bottom: 4px;
}
.search-result-item .collection-name {
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 8px;
}
.search-result-item p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ─── FOOTER ─── */
.footer {
  background: var(--purple-deep);
  padding: 32px 40px;
  text-align: center;
}
.footer-content {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
}
.footer-logo svg { height: 22px; }
.footer-links {
  display: flex;
  gap: 24px;
}
.footer-links a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}
.footer-links a:hover { color: rgba(255,255,255,0.9); }

/* ─── BACK TO TOP ─── */
.back-to-top {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--purple-mid);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  margin-top: 40px;
  cursor: pointer;
}
.back-to-top:hover { text-decoration: underline; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .header-top { padding: 12px 20px; }
  .header-content { padding: 32px 20px 40px; }
  .header-content h1 { font-size: 24px; }
  .main { padding: 24px 16px 60px; }
  .collections-grid { grid-template-columns: 1fr; }
  .footer-content { flex-direction: column; gap: 16px; }
  .collection-header { flex-direction: column; align-items: center; text-align: center; }
  .header-nav { display: none; }
  .ref-table { font-size: 12px; }
  .ref-table th, .ref-table td { padding: 8px 10px; }
}

/* ─── TRANSITIONS ─── */
.view-transition {
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── PRINT ─── */
@media print {
  .header, .footer, .search-box, .back-to-top { display: none; }
  .main { max-width: 100%; padding: 20px; }
}
</style>
</head>

<p>Traditional e-signature tools weren't designed for recruitment at scale. Contract Hub solves this by providing:</p>
<ul>
  <li><strong>In-chat contract delivery</strong> — Contracts arrive via WhatsApp, SMS, or email, right where candidates already communicate</li>
  <li><strong>Template-based workflows</strong> — Upload once, reuse unlimited times with auto-populated candidate data</li>
  <li><strong>Smart matching rules</strong> — Automatically match the right contract template to the right candidate based on campaign, location, or other attributes</li>
  <li><strong>Real-time tracking</strong> — Know exactly who signed, who's pending, and who needs a reminder</li>
  <li><strong>Full audit trail</strong> — Every action is logged for legal compliance</li>
</ul>

<h2>Who Uses Contract Hub?</h2>
<ul>

  <li><strong>Administrators</strong> — Configure settings, manage users and companies</li>
  <li><strong>Candidates</strong> — Receive, review, and sign contracts from any device</li>
</ul>

<div class="info-box tip">
  <strong>Tip</strong>
  Contract Hub is fully integrated with the Talkpush platform, so candidate data flows automatically from your recruitment pipeline into contracts.
</div>

<p>Before diving in, familiarize yourself with these key terms:</p>

<table class="ref-table">
  <tr><th>Term</th><th>Definition</th></tr>
  <tr><td><strong>Template</strong></td><td>A reusable contract document (DOCX or PDF) with placeholders for candidate-specific data. Managed under the <strong>Contracts</strong> section in the sidebar.</td></tr>

<p>Matching Rules allow you to automatically determine which contract template is sent to a candidate. This is configured as the final step of template creation, or you can add/edit them later from the template settings.</p>

<img src="screenshots/matching-rules.png" alt="Matching rules configuration" />

<h2>How Matching Rules Work</h2>
<p>When a contract request comes in from Talkpush, the system evaluates the candidate's data against your matching rules to select the correct template. If multiple templates match, the most specific rule wins.</p>

<h2>Campaign Selection</h2>
<p>The first part of a matching rule is selecting which <strong>campaigns</strong> this template applies to. You can select one or more campaigns from a multi-select dropdown. Only candidates from the selected campaigns will be considered for this template.</p>

<h2>Attribute Filters</h2>
<p>Beyond campaigns, you can add attribute-based conditions to further narrow which candidates receive this template. Each filter consists of:</p>
<ul>
  <li><strong>Attribute</strong> — The candidate data field to check (e.g., location, department, job level)</li>
  <li><strong>Operator</strong> — The comparison type:
    <ul>
      <li><code>is</code> — Exact match</li>
      <li><code>is not</code> — Excludes exact match</li>
      <li><code>contains</code> — Partial text match</li>
    </ul>
  </li>
  <li><strong>Value</strong> — The expected value to compare against</li>
</ul>

<h2>AND / OR Logic</h2>
<p>When you add multiple attribute filters, you can toggle between:</p>
<ul>
  <li><strong>AND</strong> — All conditions must be true (stricter, more specific matching)</li>
  <li><strong>OR</strong> — Any condition can be true (broader matching)</li>
</ul>

<h3>Example</h3>
<p>To send a specific contract to candidates in New York who are applying for Manager-level roles:</p>
<ol>
  <li>Select the relevant campaigns</li>
  <li>Add filter: Location <code>is</code> "New York"</li>
  <li>Add filter: Job Level <code>is</code> "Manager"</li>
  <li>Set logic to <strong>AND</strong></li>
</ol>

<div class="info-box warning">
  <strong>Important</strong>

<h3>What file formats can I upload as a template?</h3>
<p>Contract Hub supports DOCX (Word) and PDF files. DOCX files can be edited using the rich text Template Builder or converted to overlay mode. PDF files always use the Field Overlay Editor for field placement.</p>

<h3>Can I have multiple signers on a contract?</h3>

// ─── SEARCH INDEX ───
function buildSearchIndex() {
  const index = [];
  COLLECTIONS.forEach(col => {
    col.articles.forEach(art => {
      const text = (art.title + ' ' + art.subtitle + ' ' + art.body).replace(/<[^>]+>/g, '').toLowerCase();
      index.push({
        collectionId: col.id,
        collectionTitle: col.title,
        articleId: art.id,
        title: art.title,
        subtitle: art.subtitle,
        text: text
      });
    });
  });
  return index;
}

const searchIndex = buildSearchIndex();

// ─── ROUTING ───
function navigateTo(view, id, collectionId) {
  if (view === 'home') {
    window.location.hash = '';
  } else if (view === 'collection') {
    window.location.hash = '#collection/' + id;
  } else if (view === 'article') {
    window.location.hash = '#article/' + collectionId + '/' + id;
  }
}

function parseHash() {
  const hash = window.location.hash.replace('#', '');
  if (!hash) return { view: 'home' };
  const parts = hash.split('/');
  if (parts[0] === 'collection') return { view: 'collection', id: parts[1] };
  if (parts[0] === 'article') return { view: 'article', collectionId: parts[1], id: parts[2] };
  if (parts[0] === 'search') return { view: 'search', query: decodeURIComponent(parts.slice(1).join('/')) };
  return { view: 'home' };
}

// ─── RENDERING ───
function render() {
  const route = parseHash();
  const app = document.getElementById('app');
  const header = document.getElementById('site-header');
  const searchInput = document.getElementById('search-input');
  const headerTitle = document.getElementById('header-title');

  // Reset search
  if (route.view !== 'search') {
    searchInput.value = '';
  }

  // Header style
  if (route.view === 'home') {
    header.className = 'header';
    headerTitle.textContent = 'How can we help?';
  } else {
    header.className = 'header compact';
    headerTitle.textContent = 'Contract Hub Help Center';
  }

  // Render view
  if (route.view === 'home') {
    renderHome(app);
  } else if (route.view === 'collection') {
    renderCollection(app, route.id);
  } else if (route.view === 'article') {
    renderArticle(app, route.collectionId, route.id);
  } else if (route.view === 'search') {
    renderSearchResults(app, route.query);
  }

  // Scroll to top
  window.scrollTo(0, 0);
}

function renderHome(app) {
  let html = '<div class="view-transition"><div class="collections-grid">';
  COLLECTIONS.forEach(col => {
    html += `
      <div class="collection-card" onclick="navigateTo('collection', '${col.id}')">
        <div class="collection-card-icon" style="background:${col.iconBg}">${col.icon}</div>
        <h3>${col.title}</h3>
        <p>${col.description}</p>
        <div class="collection-card-meta">
          <div class="avatar">CH</div>
          <span>${col.articleCount} article${col.articleCount !== 1 ? 's' : ''}</span>
        </div>
      </div>`;
  });
  html += '</div></div>';
  app.innerHTML = html;
}

function renderCollection(app, collectionId) {
  const col = COLLECTIONS.find(c => c.id === collectionId);
  if (!col) { renderHome(app); return; }

  let html = `<div class="view-transition">
    <div class="breadcrumbs">
      <a href="#" onclick="navigateTo('home'); return false;">All Collections</a>
      <span class="sep">\u203A</span>
      <span class="current">${col.title}</span>
    </div>
    <div class="collection-header">
      <div class="collection-header-icon" style="background:${col.iconBg}">${col.icon}</div>
      <div class="collection-header-info">
        <h2>${col.title}</h2>
        <p class="meta">${col.articleCount} article${col.articleCount !== 1 ? 's' : ''}</p>
      </div>
    </div>
    <ul class="article-list">`;

  col.articles.forEach(art => {
    html += `<li><a href="#" onclick="navigateTo('article', '${art.id}', '${col.id}'); return false;">
      <span class="article-title">${art.title}</span>
      <span class="chevron">\u203A</span>
    </a></li>`;
  });

  html += `</ul>
    <a class="back-to-top" onclick="navigateTo('home'); return false;">\u2190 Back to all collections</a>
  </div>`;
  app.innerHTML = html;
}

function renderArticle(app, collectionId, articleId) {
  const col = COLLECTIONS.find(c => c.id === collectionId);
  if (!col) { renderHome(app); return; }
  const art = col.articles.find(a => a.id === articleId);
  if (!art) { renderCollection(app, collectionId); return; }

  let html = `<div class="view-transition">
    <div class="breadcrumbs">
      <a href="#" onclick="navigateTo('home'); return false;">All Collections</a>
      <span class="sep">\u203A</span>
      <a href="#" onclick="navigateTo('collection', '${col.id}'); return false;">${col.title}</a>
      <span class="sep">\u203A</span>
      <span class="current">${art.title}</span>
    </div>
    <div class="article-header">
      <h1>${art.title}</h1>
      <p class="subtitle">${art.subtitle}</p>
      <div class="article-meta">
        <div class="avatar">CH</div>
        <span>Contract Hub Team</span>
        <span>&middot;</span>
        <span>Updated February 2026</span>
      </div>
    </div>
    <div class="article-body">${art.body}</div>
    <a class="back-to-top" onclick="navigateTo('collection', '${col.id}'); return false;">\u2190 Back to ${col.title}</a>
  </div>`;
  app.innerHTML = html;
}

function renderSearchResults(app, query) {
  const q = query.toLowerCase().trim();
  const results = searchIndex.filter(item => item.text.includes(q));

  let html = `<div class="view-transition">
    <div class="breadcrumbs">
      <a href="#" onclick="navigateTo('home'); return false;">All Collections</a>
      <span class="sep">\u203A</span>
      <span class="current">Search results</span>
    </div>
    <div class="search-results">
      <h2>${results.length} result${results.length !== 1 ? 's' : ''} for "${query}"</h2>`;

  if (results.length === 0) {
    html += `<p style="color:var(--text-secondary);margin-top:16px;">No articles found matching your search. Try different keywords or <a href="#" onclick="navigateTo('home'); return false;" style="color:var(--purple-mid);">browse all collections</a>.</p>`;
  } else {
    results.forEach(r => {
      // Extract snippet
      const idx = r.text.indexOf(q);
      const start = Math.max(0, idx - 60);
      const end = Math.min(r.text.length, idx + q.length + 100);
      let snippet = (start > 0 ? '...' : '') + r.text.slice(start, end) + (end < r.text.length ? '...' : '');
      // Bold the match
      snippet = snippet.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '<strong>$&</strong>');

      html += `<div class="search-result-item" onclick="navigateTo('article', '${r.articleId}', '${r.collectionId}')">
        <h4>${r.title}</h4>
        <div class="collection-name">${r.collectionTitle}</div>
        <p>${snippet}</p>
      </div>`;
    });
  }

  html += `</div>
    <a class="back-to-top" onclick="navigateTo('home'); return false;">\u2190 Back to all collections</a>
  </div>`;
  app.innerHTML = html;
}

// ─── SEARCH HANDLER ───
let searchTimeout;
function handleSearch(value) {
  clearTimeout(searchTimeout);
  if (!value.trim()) {
    if (parseHash().view === 'search') navigateTo('home');
    return;
  }
  searchTimeout = setTimeout(() => {
    window.location.hash = '#search/' + encodeURIComponent(value.trim());
  }, 300);
}

// ─── INIT ───
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);
</script>
